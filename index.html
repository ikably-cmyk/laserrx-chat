<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LaserRx AI Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --teal: #1D9E75; --teal-l: #E1F5EE; --teal-m: #5DCAA5; --teal-d: #085041;
      --bg: #ffffff; --bg2: #f7f7f5; --bg3: #f0f0ec;
      --txt: #1a1a18; --txt2: #6b6b67;
      --brd: rgba(0,0,0,0.1); --brd2: rgba(0,0,0,0.18);
      --r: 12px; --sans: 'Plus Jakarta Sans', system-ui, sans-serif; --mono: 'DM Mono', monospace;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #141412; --bg2: #1e1e1a; --bg3: #252520;
        --txt: #f0f0ec; --txt2: #9a9a94;
        --brd: rgba(255,255,255,0.1); --brd2: rgba(255,255,255,0.18);
        --teal-l: #0a2e22; --teal-m: #1D9E75; --teal-d: #9FE1CB;
      }
    }
    html, body { height: 100%; overflow: hidden; background: var(--bg); font-family: var(--sans); color: var(--txt); -webkit-font-smoothing: antialiased; }
    .app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; max-width: 480px; margin: 0 auto; }
    .hdr { display: flex; align-items: center; gap: 10px; padding: 12px 14px 10px; background: var(--bg); border-bottom: 0.5px solid var(--brd); flex-shrink: 0; }
    .logo { width: 30px; height: 30px; border-radius: 9px; background: var(--teal); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .logo svg { width: 15px; height: 15px; }
    .hdr-info { flex: 1; min-width: 0; }
    .hdr-title { font-size: 13px; font-weight: 600; color: var(--txt); line-height: 1; margin-bottom: 3px; }
    .hdr-sub { font-size: 10px; color: var(--teal); font-family: var(--mono); display: flex; align-items: center; gap: 5px; }
    .dot-live { width: 5px; height: 5px; border-radius: 50%; background: var(--teal); animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .btn-icon { width: 30px; height: 30px; border-radius: 8px; border: 0.5px solid var(--brd2); background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--txt2); transition: all 0.12s; flex-shrink: 0; }
    .btn-icon:hover { border-color: var(--teal-m); color: var(--teal); background: var(--teal-l); }
    .btn-icon svg { width: 13px; height: 13px; }
    .tabs { display: flex; border-bottom: 0.5px solid var(--brd); background: var(--bg); flex-shrink: 0; }
    .tab { flex: 1; padding: 9px 6px; font-size: 10px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--txt2); background: none; border: none; cursor: pointer; border-bottom: 2px solid transparent; font-family: var(--mono); transition: all 0.15s; }
    .tab:hover { color: var(--txt); }
    .tab.on { color: var(--teal); border-bottom-color: var(--teal); }
    .credits-bar { display: flex; align-items: center; justify-content: space-between; padding: 6px 14px; background: var(--bg2); border-bottom: 0.5px solid var(--brd); flex-shrink: 0; }
    .credits-label { font-size: 10px; font-family: var(--mono); color: var(--txt2); }
    .credits-value { font-size: 10px; font-family: var(--mono); font-weight: 500; color: var(--teal); }
    .msgs { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 12px; display: flex; flex-direction: column; gap: 8px; -webkit-overflow-scrolling: touch; }
    .msg { display: flex; gap: 7px; animation: msgIn 0.18s ease; }
    @keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .msg.u { flex-direction: row-reverse; }
    .av { width: 24px; height: 24px; border-radius: 50%; background: var(--bg2); border: 0.5px solid var(--brd); font-size: 9px; font-weight: 500; color: var(--txt2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; font-family: var(--mono); }
    .av.ai { background: var(--teal-l); border-color: var(--teal-m); color: var(--teal-d); }
    .bbl { max-width: calc(100% - 36px); padding: 9px 12px; border-radius: var(--r); font-size: 13.5px; line-height: 1.6; color: var(--txt); background: var(--bg2); border: 0.5px solid var(--brd); word-break: break-word; white-space: pre-wrap; }
    .msg.u .bbl { background: var(--teal-l); border-color: var(--teal-m); color: var(--teal-d); }
    .bbl strong { font-weight: 600; }
    .bbl code { font-family: var(--mono); font-size: 12px; background: var(--bg3); padding: 1px 5px; border-radius: 4px; }
    .bbl table { width: 100%; border-collapse: collapse; font-size: 12px; margin: 8px 0; }
    .bbl th, .bbl td { text-align: left; padding: 5px 8px; border: 0.5px solid var(--brd2); }
    .bbl th { background: var(--bg3); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--txt2); }
    .sys { text-align: center; font-size: 10px; font-family: var(--mono); color: var(--txt2); padding: 4px 0; letter-spacing: 0.04em; opacity: 0.7; }
    .typing { display: flex; gap: 4px; padding: 11px 12px; background: var(--bg2); border: 0.5px solid var(--brd); border-radius: var(--r); align-items: center; }
    .typing span { width: 5px; height: 5px; border-radius: 50%; background: var(--teal-m); animation: blink 1.1s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes blink { 0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1); } }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 12px 8px; flex-shrink: 0; }
    .chip { font-size: 11px; padding: 5px 12px; border-radius: 100px; border: 0.5px solid var(--brd2); background: var(--bg2); color: var(--txt2); cursor: pointer; font-family: var(--mono); transition: all 0.12s; white-space: nowrap; }
    .chip:hover { border-color: var(--teal-m); color: var(--teal-d); background: var(--teal-l); }
    .bar { border-top: 0.5px solid var(--brd); padding: 8px 10px; display: flex; gap: 7px; align-items: flex-end; flex-shrink: 0; background: var(--bg); padding-bottom: max(8px, env(safe-area-inset-bottom)); }
    .inp { flex: 1; padding: 8px 11px; font-size: 14px; font-family: var(--sans); border: 0.5px solid var(--brd2); border-radius: 10px; background: var(--bg2); color: var(--txt); resize: none; outline: none; line-height: 1.45; min-height: 36px; max-height: 100px; -webkit-appearance: none; }
    .inp:focus { border-color: var(--teal-m); }
    .inp::placeholder { color: var(--txt2); }
    .btn-send { width: 36px; height: 36px; border-radius: 10px; background: var(--teal); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.12s, transform 0.1s; -webkit-tap-highlight-color: transparent; }
    .btn-send:hover { background: #0F6E56; }
    .btn-send:active { transform: scale(0.93); }
    .btn-send:disabled { background: var(--bg3); cursor: not-allowed; }
    .btn-send svg { width: 14px; height: 14px; }
  </style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2">
        <path d="M12 2l2 7h7l-5.5 4 2 7L12 16l-5.5 4 2-7L3 9h7z"/>
      </svg>
    </div>
    <div class="hdr-info">
      <div class="hdr-title">LaserRx AI</div>
      <div class="hdr-sub"><span class="dot-live"></span><span id="status-txt">ready</span></div>
    </div>
    <button class="btn-icon" onclick="resetChat()" title="New consultation">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
        <path d="M2 8a6 6 0 1 0 .5-2.4M2 3v3h3"/>
      </svg>
    </button>
  </div>

  <div class="tabs">
    <button class="tab on" id="tab-protocols" onclick="switchMod('protocols')">Protocols</button>
    <button class="tab" id="tab-calculator" onclick="switchMod('calculator')">Calculator</button>
    <button class="tab" id="tab-devices" onclick="switchMod('devices')">Devices</button>
  </div>

  <div class="credits-bar">
    <span class="credits-label">Plan: <span id="plan-txt">—</span></span>
    <span class="credits-value" id="credits-txt">— consultations</span>
  </div>

  <div class="msgs" id="msgs"></div>
  <div class="chips" id="chips"></div>

  <div class="bar">
    <textarea class="inp" id="inp" placeholder="Write your question..." rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"
      oninput="autosize(this)"></textarea>
    <button class="btn-send" id="sbtn" onclick="send()">
      <svg viewBox="0 0 16 16" fill="none" stroke="white" stroke-width="2">
        <path d="M2 8h12M9 3l5 5-5 5"/>
      </svg>
    </button>
  </div>
</div>

<script>
const WEBHOOKS = {
  protocols:  'https://laserai.app.n8n.cloud/webhook/laserrx-chat-protocols',
  calculator: 'https://laserai.app.n8n.cloud/webhook/laserrx-chat-calculator',
  devices:    'https://laserai.app.n8n.cloud/webhook/laserrx-chat-devices'
};

const MODULES = {
  protocols: {
    welcome: "Hello! I'll help you find the right laser protocol.\n\nWhat **laser type** are you using?",
    chips: ['Diode', 'Er:YAG', 'Er,Cr:YSGG', 'Nd:YAG', 'CO₂', 'PBM Laser', 'Other']
  },
  calculator: {
    welcome: "Let's calculate your laser parameters.\n\nWhat **laser type** are you working with?",
    chips: ['Diode', 'Er:YAG', 'Er,Cr:YSGG', 'CO₂', 'PBM Laser', 'Other']
  },
  devices: {
    welcome: "I can identify any dental laser or PBM device.\n\nWhat is the **device name, brand, or wavelength**?",
    chips: ['Fotona LightWalker', 'Biolase Waterlase', 'SIROLaser Advance', '980nm diode', '10600nm CO₂', 'Other']
  }
};

const params = new URLSearchParams(window.location.search);
const USER_EMAIL = params.get('email') || '';
let mod = params.get('module') || 'protocols';
let history = [];
let busy = false;

document.addEventListener('DOMContentLoaded', () => {
  if (!MODULES[mod]) mod = 'protocols';
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  document.getElementById('tab-' + mod).classList.add('on');
  if (USER_EMAIL) {
    document.getElementById('status-txt').textContent = USER_EMAIL.split('@')[0];
    document.getElementById('plan-txt').textContent = 'loading...';
  }
  startChat();
});

function autosize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function scrollBottom() {
  const m = document.getElementById('msgs');
  requestAnimationFrame(() => m.scrollTop = m.scrollHeight);
}

function md(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\n/g, '<br>');
}

function addMsg(role, text) {
  const m = document.getElementById('msgs');
  const isUser = role === 'user';
  const div = document.createElement('div');
  div.className = 'msg' + (isUser ? ' u' : '');
  const av = document.createElement('div');
  av.className = 'av' + (isUser ? '' : ' ai');
  av.textContent = isUser ? 'me' : 'AI';
  const bbl = document.createElement('div');
  bbl.className = 'bbl';
  bbl.innerHTML = md(text);
  div.appendChild(av);
  div.appendChild(bbl);
  m.appendChild(div);
  scrollBottom();
}

function addSys(text) {
  const m = document.getElementById('msgs');
  const div = document.createElement('div');
  div.className = 'sys';
  div.textContent = '— ' + text + ' —';
  m.appendChild(div);
  scrollBottom();
}

function showTyping() {
  const m = document.getElementById('msgs');
  const wrap = document.createElement('div');
  wrap.className = 'msg';
  wrap.id = 'typing';
  const av = document.createElement('div');
  av.className = 'av ai';
  av.textContent = 'AI';
  const t = document.createElement('div');
  t.className = 'typing';
  t.innerHTML = '<span></span><span></span><span></span>';
  wrap.appendChild(av);
  wrap.appendChild(t);
  m.appendChild(wrap);
  scrollBottom();
}

function hideTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function setChips(list) {
  const c = document.getElementById('chips');
  c.innerHTML = '';
  list.forEach(text => {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.textContent = text;
    btn.onclick = () => quickSend(text);
    c.appendChild(btn);
  });
}

function updateCredits(plan, credits) {
  document.getElementById('plan-txt').textContent = plan || '—';
  document.getElementById('credits-txt').textContent =
    (plan === 'Elite' || plan === 'Institutional') ? 'Unlimited' :
    (credits !== undefined ? credits + ' left' : '— consultations');
}

function startChat() {
  history = [];
  document.getElementById('msgs').innerHTML = '';
  setChips(MODULES[mod].chips);
  const welcome = MODULES[mod].welcome;
  addMsg('ai', welcome);
  history.push({ role: 'assistant', content: welcome });
}

function resetChat() {
  startChat();
  addSys('New consultation');
}

function switchMod(newMod) {
  if (newMod === mod && history.length > 1) return;
  mod = newMod;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  document.getElementById('tab-' + mod).classList.add('on');
  document.getElementById('msgs').innerHTML = '';
  history = [];
  addSys(newMod.charAt(0).toUpperCase() + newMod.slice(1) + ' module');
  setChips(MODULES[mod].chips);
  const welcome = MODULES[mod].welcome;
  addMsg('ai', welcome);
  history.push({ role: 'assistant', content: welcome });
}

function quickSend(text) {
  document.getElementById('inp').value = text;
  send();
}

async function send() {
  if (busy) return;
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  inp.style.height = 'auto';
  busy = true;
  document.getElementById('sbtn').disabled = true;
  setChips([]);
  document.getElementById('status-txt').textContent = 'thinking...';
  addMsg('user', text);
  history.push({ role: 'user', content: text });
  showTyping();

  try {
    const res = await fetch(WEBHOOKS[mod], {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        user_email: USER_EMAIL,
        last_message: text,
        history: history.slice(0, -1),
        module: mod
      })
    });

    const data = await res.json();
    hideTyping();

    if (data.error) {
      if (res.status === 403) {
        addMsg('ai', '⚠️ You have no consultations left.\n\nPlease upgrade your plan to continue.');
      } else {
        addMsg('ai', 'Something went wrong. Please try again.');
      }
      document.getElementById('status-txt').textContent = 'error';
    } else {
      const reply = data.response || 'I could not process that. Please try again.';
      history.push({ role: 'assistant', content: reply });
      addMsg('ai', reply);
      if (data.plan) updateCredits(data.plan, data.credits);
      setChips(getSuggestions(mod, reply));
      document.getElementById('status-txt').textContent =
        USER_EMAIL ? USER_EMAIL.split('@')[0] : 'ready';
    }
  } catch(e) {
    hideTyping();
    addMsg('ai', 'Connection error. Please check your connection and try again.');
    document.getElementById('status-txt').textContent = 'offline';
  }

  busy = false;
  document.getElementById('sbtn').disabled = false;
}

function getSuggestions(m, reply) {
  const r = reply.toLowerCase();
  if (m === 'protocols') {
    if (r.includes('laser type') || r.includes('tipo de láser')) return ['Diode', 'Er:YAG', 'Er,Cr:YSGG', 'Nd:YAG', 'CO₂', 'Other'];
    if (r.includes('tissue') || r.includes('tejido')) return ['Soft tissue', 'Hard tissue', 'Endodontics', 'Periodontics', 'Other'];
    if (r.includes('indication') || r.includes('procedure')) return ['Gingivectomy', 'Frenectomy', 'Wound healing', 'Peri-implantitis', 'Other'];
    return ['What are the contraindications?', 'Explain the technique', 'Safety tips', 'Other procedure'];
  }
  if (m === 'calculator') {
    if (r.includes('power') || r.includes('potencia')) return ['0.5 W', '1.0 W', '1.5 W', '2.0 W', 'Other'];
    if (r.includes('frequency') || r.includes('hz')) return ['10 Hz', '15 Hz', '20 Hz', '25 Hz', 'CW mode'];
    if (r.includes('tip') || r.includes('diameter')) return ['300 µm', '400 µm', '600 µm', '800 µm', 'Other'];
    return ['What does this irradiance mean clinically?', 'Is this safe?', 'Calculate another setup'];
  }
  if (m === 'devices') {
    return ['What protocols can I use?', 'What tips does it use?', 'How do I initiate the fiber?', 'Maintenance tips'];
  }
  return [];
}
</script>
</body>
</html>
